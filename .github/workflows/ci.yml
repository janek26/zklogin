name: verify
on: [push, pull_request]
jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22.23.1 }
      - uses: pnpm/action-setup@v4
        with: { version: 11.12.0 }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm test:contracts
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: foundry-rs/foundry-toolchain@v1
      - run: cd contracts && forge fmt --check
      - run: cd contracts && forge build
      - run: cd contracts && forge test

  deploy:
    needs: [web, contracts]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: prod
      url: https://zklogin-poc.rahrt.me
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22.23.1 }
      - uses: pnpm/action-setup@v4
        with: { version: 11.12.0 }
      - name: Validate secrets
        run: |
          if [ -z "$VITE_GOOGLE_CLIENT_ID" ]; then echo "MISSING: VITE_GOOGLE_CLIENT_ID"; exit 1; fi
          if [ -z "$VITE_ZERODEV_PROJECT_ID" ]; then echo "MISSING: VITE_ZERODEV_PROJECT_ID"; exit 1; fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then echo "MISSING: CLOUDFLARE_API_TOKEN"; exit 1; fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then echo "MISSING: CLOUDFLARE_ACCOUNT_ID"; exit 1; fi
          echo "All secrets present"
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_ZERODEV_PROJECT_ID: ${{ secrets.VITE_ZERODEV_PROJECT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          NODE_ENV: production
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_ZERODEV_PROJECT_ID: ${{ secrets.VITE_ZERODEV_PROJECT_ID }}
          VITE_MEGAETH_TESTNET_RPC_URL: https://carrot.megaeth.com/rpc
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=zklogin-poc
