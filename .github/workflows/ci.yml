name: verify
on: [push, pull_request]
jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22.23.1 }
      - uses: pnpm/action-setup@v4
        with: { version: 11.12.0 }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm test:contracts
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: foundry-rs/foundry-toolchain@v1
      - run: cd contracts && forge fmt --check
      - run: cd contracts && forge build
      - run: cd contracts && forge test

  deploy:
    needs: [web, contracts]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: prod
      url: https://zklogin-poc.rahrt.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22.23.1 }
      - uses: pnpm/action-setup@v4
        with: { version: 11.12.0 }
      - name: Validate secrets
        run: |
          fail() { echo "MISSING: $1"; exit 1; }
          [ -n "$VITE_GOOGLE_CLIENT_ID" ] || fail VITE_GOOGLE_CLIENT_ID
          echo "$VITE_GOOGLE_CLIENT_ID" | grep -qF '.apps.googleusercontent.com' || fail 'VITE_GOOGLE_CLIENT_ID (not a Google client ID)'
          [ -n "$VITE_ZERODEV_PROJECT_ID" ] || fail VITE_ZERODEV_PROJECT_ID
          echo "$VITE_ZERODEV_PROJECT_ID" | grep -qE '^[0-9a-f-]{36}$' || fail 'VITE_ZERODEV_PROJECT_ID (not a UUID)'
          [ -n "$CLOUDFLARE_API_TOKEN" ] || fail CLOUDFLARE_API_TOKEN
          [ -n "$CLOUDFLARE_ACCOUNT_ID" ] || fail CLOUDFLARE_ACCOUNT_ID
          echo "All secrets present and valid"
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_ZERODEV_PROJECT_ID: ${{ secrets.VITE_ZERODEV_PROJECT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          NODE_ENV: production
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_ZERODEV_PROJECT_ID: ${{ secrets.VITE_ZERODEV_PROJECT_ID }}
          VITE_MEGAETH_TESTNET_RPC_URL: https://carrot.megaeth.com/rpc
      - name: Install and run Wrangler
        run: |
          npm install -g wrangler
          wrangler pages deploy apps/web/dist --project-name=zklogin-poc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
