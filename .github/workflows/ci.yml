name: verify
on: [push, pull_request]
jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22.23.1 }
      - uses: pnpm/action-setup@v4
        with: { version: 11.12.0 }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm test:contracts
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: foundry-rs/foundry-toolchain@v1
      - run: cd contracts && forge fmt --check
      - run: cd contracts && forge build
      - run: cd contracts && forge test

  deploy:
    needs: [web, contracts]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22.23.1 }
      - uses: pnpm/action-setup@v4
        with: { version: 11.12.0 }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_ZERODEV_PROJECT_ID: ${{ secrets.VITE_ZERODEV_PROJECT_ID }}
          VITE_MEGAETH_TESTNET_RPC_URL: https://carrot.megaeth.com/rpc
      - uses: actions/upload-pages-artifact@v3
        with: { path: apps/web/dist }
      - uses: actions/deploy-pages@v4
        id: deploy
